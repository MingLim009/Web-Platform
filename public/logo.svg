<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 130" width="100" height="130">
  <defs>
    <!-- Pin top (orange) — richer gradient -->
    <linearGradient id="pinTop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFB266"/>
      <stop offset="55%" stop-color="#FF8A2C"/>
      <stop offset="100%" stop-color="#E65800"/>
    </linearGradient>
    <!-- Pin bottom (blue) — deeper, more dimensional -->
    <linearGradient id="pinBottom" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4FA3F7"/>
      <stop offset="55%" stop-color="#0F77E5"/>
      <stop offset="100%" stop-color="#003D80"/>
    </linearGradient>
    <!-- Check mark — neon green -->
    <linearGradient id="checkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6CFFB4"/>
      <stop offset="55%" stop-color="#28C76F"/>
      <stop offset="100%" stop-color="#0E8E4E"/>
    </linearGradient>
    <!-- Glassy highlight on top of the pin -->
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.55)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <!-- Soft drop shadow under the pin -->
    <radialGradient id="shadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(0,0,0,0.35)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
    <!-- Glow filter -->
    <filter id="logoGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Floor shadow -->
  <ellipse cx="50" cy="123" rx="26" ry="3.5" fill="url(#shadow)"/>

  <!-- Pin body (bottom half — blue) -->
  <path d="M50 5 C25 5 8 22 8 47 C8 75 50 120 50 120 C50 120 92 75 92 47 C92 22 75 5 50 5 Z" fill="url(#pinBottom)"/>

  <!-- Pin top (orange dome) -->
  <path d="M50 5 C25 5 8 22 8 47 C8 51 9 55 10 59 L90 59 C91 55 92 51 92 47 C92 22 75 5 50 5 Z" fill="url(#pinTop)"/>

  <!-- Inner glow stroke around the pin -->
  <path d="M50 5 C25 5 8 22 8 47 C8 75 50 120 50 120 C50 120 92 75 92 47 C92 22 75 5 50 5 Z"
        fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1.2"/>

  <!-- Glassy highlight -->
  <path d="M16 22 C26 12 40 8 50 8 C58 8 64 9 68 11 C58 9 42 11 30 18 C24 22 20 26 18 30 Z"
        fill="url(#shine)" opacity="0.75"/>

  <!-- Phone/screen frame (decorative) -->
  <rect x="36" y="22" width="28" height="20" rx="3.5" fill="none" stroke="#ffffff" stroke-width="2.6" filter="url(#logoGlow)"/>
  <rect x="44" y="18" width="12" height="6" rx="1.8" fill="none" stroke="#ffffff" stroke-width="2.6"/>

  <!-- Outer glow halo for checkmark -->
  <path d="M28 50 L45 72 L78 38" fill="none" stroke="rgba(108, 255, 180, 0.45)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Check mark colored -->
  <path d="M28 50 L45 72 L78 38" fill="none" stroke="url(#checkGrad)" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Check mark white core -->
  <path d="M28 50 L45 72 L78 38" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Small specular sparkle on the dome -->
  <circle cx="36" cy="20" r="2.4" fill="#ffffff" opacity="0.85"/>
  <circle cx="32" cy="24" r="1.2" fill="#ffffff" opacity="0.6"/>
</svg>
