<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 130" width="100" height="130">
  <defs>
    <!-- Pin top (orange) — richer 4-stop gradient with hot tip -->
    <linearGradient id="pinTop" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%"  stop-color="#FFE0B0"/>
      <stop offset="35%" stop-color="#FFB266"/>
      <stop offset="70%" stop-color="#FF8A2C"/>
      <stop offset="100%" stop-color="#D44E00"/>
    </linearGradient>

    <!-- Pin bottom (blue) — deep + luminous -->
    <linearGradient id="pinBottom" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%"  stop-color="#6CB5FF"/>
      <stop offset="40%" stop-color="#1E88E5"/>
      <stop offset="80%" stop-color="#003D80"/>
      <stop offset="100%" stop-color="#001A40"/>
    </linearGradient>

    <!-- Inner shine on the pin bottom -->
    <radialGradient id="pinInner" cx="35%" cy="45%" r="55%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.55)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>

    <!-- Check — vivid neon green -->
    <linearGradient id="checkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A6FFD3"/>
      <stop offset="55%" stop-color="#2BE07A"/>
      <stop offset="100%" stop-color="#0B8A4A"/>
    </linearGradient>

    <!-- Glassy top sheen -->
    <linearGradient id="topSheen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="rgba(255,255,255,0.85)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>

    <!-- Soft ground shadow -->
    <radialGradient id="floorShadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(0,0,0,0.45)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>

    <!-- Animated diagonal shine -->
    <linearGradient id="sweep" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="rgba(255,255,255,0)">
        <animate attributeName="offset" values="-0.4;1.4" dur="3.6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="0.15" stop-color="rgba(255,255,255,0.85)">
        <animate attributeName="offset" values="-0.25;1.55" dur="3.6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="0.30" stop-color="rgba(255,255,255,0)">
        <animate attributeName="offset" values="-0.1;1.7" dur="3.6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="logoGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip the sweep to the pin silhouette -->
    <clipPath id="pinClip">
      <path d="M50 5 C25 5 8 22 8 47 C8 75 50 120 50 120 C50 120 92 75 92 47 C92 22 75 5 50 5 Z"/>
    </clipPath>
  </defs>

  <!-- Floor shadow -->
  <ellipse cx="50" cy="124" rx="28" ry="4" fill="url(#floorShadow)"/>

  <!-- Pin body (blue) -->
  <path d="M50 5 C25 5 8 22 8 47 C8 75 50 120 50 120 C50 120 92 75 92 47 C92 22 75 5 50 5 Z" fill="url(#pinBottom)"/>

  <!-- Inner blue shine -->
  <path d="M50 5 C25 5 8 22 8 47 C8 75 50 120 50 120 C50 120 92 75 92 47 C92 22 75 5 50 5 Z" fill="url(#pinInner)"/>

  <!-- Pin top dome (orange) -->
  <path d="M50 5 C25 5 8 22 8 47 C8 51 9 55 10 59 L90 59 C91 55 92 51 92 47 C92 22 75 5 50 5 Z" fill="url(#pinTop)"/>

  <!-- Inner glow stroke around the pin -->
  <path d="M50 5 C25 5 8 22 8 47 C8 75 50 120 50 120 C50 120 92 75 92 47 C92 22 75 5 50 5 Z"
        fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="1.5"/>

  <!-- Animated diagonal shine sweep -->
  <g clip-path="url(#pinClip)">
    <rect x="-20" y="-20" width="140" height="170" fill="url(#sweep)"/>
  </g>

  <!-- Top glassy highlight -->
  <path d="M16 22 C26 12 40 8 50 8 C58 8 64 9 68 11 C58 9 42 11 30 18 C24 22 20 26 18 30 Z"
        fill="url(#topSheen)" opacity="0.85"/>

  <!-- Phone/screen frame (decorative) -->
  <rect x="36" y="22" width="28" height="20" rx="3.5" fill="none" stroke="#ffffff" stroke-width="2.6" filter="url(#logoGlow)"/>
  <rect x="44" y="18" width="12" height="6" rx="1.8" fill="none" stroke="#ffffff" stroke-width="2.6"/>

  <!-- Outer halo for checkmark -->
  <path d="M28 50 L45 72 L78 38" fill="none" stroke="rgba(166, 255, 211, 0.55)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Check mark colored -->
  <path d="M28 50 L45 72 L78 38" fill="none" stroke="url(#checkGrad)" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Check mark white core -->
  <path d="M28 50 L45 72 L78 38" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Sparkles -->
  <g fill="#ffffff">
    <circle cx="36" cy="20" r="2.6" opacity="0.9"/>
    <circle cx="32" cy="24" r="1.3" opacity="0.7"/>
    <circle cx="80" cy="32" r="1.8" opacity="0.7">
      <animate attributeName="opacity" values="0.2;0.95;0.2" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="74" cy="64" r="1.4" opacity="0.6">
      <animate attributeName="opacity" values="0.95;0.2;0.95" dur="2.4s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
